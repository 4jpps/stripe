<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe Surcharge Calculator</title>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.4);
      --text-main: #1f2937;
      --text-muted: #4b5563;
      --accent: #6366f1;
      --input-bg: rgba(255, 255, 255, 0.5);
      --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
      --logo-fill: #6366f1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --glass-bg: rgba(31, 41, 55, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --accent: #818cf8;
        --input-bg: rgba(0, 0, 0, 0.2);
        --bg-gradient: linear-gradient(135deg, #111827 0%, #1e1b4b 100%);
        --logo-fill: #818cf8;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 2.2rem;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 440px;
    }

    .brand-header {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }

    .brand-logo {
      height: 48px;
      width: auto;
    }
    .brand-logo .accent-part { fill: var(--logo-fill); }
    .brand-logo .text-part { fill: var(--text-main); }

    .card-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 2.5rem;
      opacity: 0.4;
      filter: grayscale(100%);
      transition: all 0.3s ease;
    }
    
    .card-logos:hover {
      opacity: 0.9;
      filter: grayscale(0%);
    }

    .cc-icon {
      height: 22px;
      width: auto;
      display: block;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--text-muted);
    }

    input[type="number"], select {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-main);
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1.2rem;
      cursor: pointer;
    }

    @media (prefers-color-scheme: dark) {
      select {
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      }
      select option {
        background-color: #1f2937;
        color: #f9fafb;
      }
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .result-container {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .surcharge-row {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin: 1.2rem 0;
    }

    .breakdown-section {
      margin-top: 1.5rem;
      padding: 1.2rem;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      border: 1px dashed var(--glass-border);
    }

    .breakdown-title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      display: block;
      color: var(--text-main);
    }

    .step {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .copy-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      margin-left: 10px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .copy-btn:hover { opacity: 0.9; }
    .copy-btn:active { transform: scale(0.95); }
    .label-text { color: var(--text-muted); }
    .icon { width: 14px; height: 14px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="glass-card">
    <div class="brand-header">
      <svg class="brand-logo" viewBox="0 0 380 60" xmlns="http://www.w3.org/2000/svg">
        <rect class="accent-part" x="0" y="10" width="35" height="25" rx="5" />
        <rect class="accent-part" x="5" y="15" width="25" height="4" opacity="0.4" fill="white" />
        <text x="50" y="32" font-family="sans-serif" font-weight="800" font-size="20" class="text-part" letter-spacing="1">STRIPE</text>
        <text x="145" y="32" font-family="sans-serif" font-weight="700" font-size="20" class="text-part" letter-spacing="1">SURCHARGE</text>
        <text x="50" y="52" font-family="sans-serif" font-weight="300" font-size="13" class="text-part" letter-spacing="4">CALCULATOR</text>
      </svg>
    </div>

    <div class="form-group">
      <label for="netPayout">Desired Net Payout</label>
      <input type="number" id="netPayout" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
      <label for="payoutSchedule">Payout Schedule</label>
      <select id="payoutSchedule">
        <option value="standard">Standard (Free)</option>
        <option value="nextday">Next-Day (+0.6%)</option>
        <option value="instant">Instant (+1.5%, $0.50 min)</option>
      </select>
    </div>

    <div id="output" class="result-container" style="display: none;"></div>

    <div class="card-logos">
      <svg class="cc-icon" viewBox="0 0 55 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.2 1l-3.1 18.2h-4.9L15.3 1h4.9zm16.5 12.5c0-3.8-5.4-4-5.4-5.7 0-.6.5-1 1.7-1 1.4 0 2.7.3 3.7.8l.6-4c-1.1-.4-2.7-.7-4.5-.7-4.8 0-8.2 2.5-8.2 6.1 0 2.7 2.4 4.1 4.3 5 2 1 2.6 1.6 2.6 2.4 0 1.3-1.6 1.9-3.1 1.9-2 0-3.2-.4-4.9-1.1L22.8 18c1.4.6 3.8 1.2 5.9 1.2 5.1 0 8.4-2.5 8.4-6.2" fill="currentColor"/>
      </svg>
      <svg class="cc-icon" viewBox="0 0 48 20" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="10" r="9" fill="currentColor" opacity="0.8"/><circle cx="28" cy="10" r="9" fill="currentColor" opacity="0.5"/>
      </svg>
      <svg class="cc-icon" viewBox="0 0 55 20" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="51" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2.5"/>
        <text x="8" y="14" font-family="sans-serif" font-weight="900" font-size="10" fill="currentColor">AMEX</text>
      </svg>
    </div>
  </div>

  <script>
    /**
     * STRIPE SURCHARGE CALCULATOR
     * Handles variable processing logic based on standard vs premium payout types.
     */

    // --- CONFIGURATION ---
    const STRIPE_BASE_RATE = 0.029;    // 2.9%
    const STRIPE_FIXED_FEE = 0.30;     // $0.30
    
    const inputField = document.getElementById('netPayout');
    const scheduleSelect = document.getElementById('payoutSchedule');
    const outputDiv = document.getElementById('output');

    const copyIcon = `<svg class="icon" viewBox="0 0 24 24" style="margin-right: 6px;"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
    const checkIcon = `<svg class="icon" viewBox="0 0 24 24" style="margin-right: 6px;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Done`;

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = checkIcon;
        btn.style.background = '#10b981';
        setTimeout(() => { 
          btn.innerHTML = copyIcon; 
          btn.style.background = ''; 
        }, 2000);
      });
    }

    function calculateSurcharge() {
      const net = parseFloat(inputField.value);
      if (isNaN(net) || net <= 0) {
        outputDiv.style.display = 'none';
        return;
      }

      const mode = scheduleSelect.value;
      const STRIPE_INSTANT_COMBINED_RATE = STRIPE_BASE_RATE + 0.015;
      let totalFixedFee = STRIPE_FIXED_FEE;
      let totalPercentageRate = STRIPE_BASE_RATE;
      let labelText = '2.9%';
      let step1Text = `1. Net + Fixed Fee ($${STRIPE_FIXED_FEE.toFixed(2)})`;

      if (mode === 'nextday') {
        totalPercentageRate += 0.006; // Updated to 0.6%
        labelText = '3.5%';
      } else if (mode === 'instant') {
        // --- DYNAMIC INSTANT PAYOUT CHECK ---
        const testExactTotal = (net + STRIPE_FIXED_FEE) / (1 - STRIPE_INSTANT_COMBINED_RATE);
        const testPayoutVolume = testExactTotal * (1 - STRIPE_BASE_RATE) - STRIPE_FIXED_FEE;
        const testInstantFee = testPayoutVolume * 0.015;

        if (testInstantFee < INSTANT_PAYOUT_MIN_FEE) {
          totalFixedFee += INSTANT_PAYOUT_MIN_FEE;
          labelText = '2.9%';
          step1Text = `1. Net + Fees ($0.30 base + $${INSTANT_PAYOUT_MIN_FEE.toFixed(2)} instant min)`;
        } else {
          totalPercentageRate += 0.015;
          labelText = '4.4%';
        }
      }

      outputDiv.style.display = 'block';
      const subtotal = net + totalFixedFee;
      const exactTotal = subtotal / (1 - totalPercentageRate);
      const roundedTotal = Math.round(exactTotal * 100) / 100;
      const surcharge = roundedTotal - net;
      const variance = Math.abs(exactTotal - roundedTotal);

      outputDiv.innerHTML = `
        <div class="result-row">
          <span class="label-text">Total to Charge</span>
          <span style="font-weight: 600; color: var(--text-main);">$${roundedTotal.toFixed(2)}</span>
        </div>
        <div class="result-row surcharge-row">
          <span>Surcharge</span>
          <span style="display: flex; align-items: center;">
            $${surcharge.toFixed(2)}
            <button class="copy-btn" title="Copy Surcharge" onclick="copyToClipboard('${surcharge.toFixed(2)}', this)">
              ${copyIcon}
            </button>
          </span>
        </div>
        
        <div class="breakdown-section">
          <span class="breakdown-title">Logic Breakdown</span>
          <div class="step">
            <span>${step1Text}</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
          <div class="step">
            <span>2. Add ${labelText} of Total</span>
            <span>+$${(exactTotal - subtotal).toFixed(3)}</span>
          </div>
          <div class="step">
            <span>3. Raw Calculated Total</span>
            <span>$${exactTotal.toFixed(4)}</span>
          </div>
          <div class="step" style="opacity: 0.8; font-style: italic;">
            <span>Rounding Variance</span>
            <span>$${variance.toFixed(5)}</span>
          </div>
          <div class="step" style="margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 10px; font-weight: 700; color: var(--text-main);">
            <span>4. Final Charge</span>
            <span>$${roundedTotal.toFixed(2)}</span>
          </div>
        </div>
      `;
    }

    // Event listeners
    inputField.addEventListener('input', calculateSurcharge);
    scheduleSelect.addEventListener('change', calculateSurcharge);
  </script>
</body>
</html>
